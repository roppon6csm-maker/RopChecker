<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RopMarge</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; padding: 15px; background: #f0f2f5; color: #333; margin: 0; line-height: 1.5; }
        .container { max-width: 600px; margin: 0 auto; }
        textarea { width: 100%; height: 120px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; padding: 10px; font-size: 16px; display: block; background: #f9f9f9; color: #333; }
        button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .result { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        #outputCode { white-space: pre-wrap; background: #fff; padding: 10px; border: 1px solid #ddd; margin-top: 10px; font-family: monospace; font-size: 12px; height: 200px; overflow-y: scroll; }
        #previewModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 10000; border: none; }
        #closePreview { position: fixed; top: 10px; right: 10px; width: 44px; height: 44px; background: rgba(0,0,0,0.5); color: white; border-radius: 50%; font-size: 24px; font-weight: bold; z-index: 10001; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <h2 style="margin: 0;">RopMarge</h2>
        <button onclick="copyProtocol()" style="width: auto; padding: 5px 10px; font-size: 8px; line-height: 1.2; background: #6f42c1; color: white; border-radius: 6px;">
            最初にGeminiに<br>貼り付ける文言をコピー
        </button>
    </div>
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
        <label>1. マスターコード（現在の全コード）</label>
        <div style="display: flex; gap: 5px;">
            <button onclick="pasteTo('masterCode')" style="width: auto; padding: 5px 12px; background: #007bff; color: white; font-size: 9px; border-radius: 4px; border: none;">貼り付け</button>
            <button onclick="document.getElementById('masterCode').value=''" style="width: auto; padding: 5px 12px; background: #6c757d; color: white; font-size: 9px; border-radius: 4px; border: none;">クリア</button>
        </div>
    </div>
    <textarea id="masterCode" placeholder="[貼り付け] ボタンで入力" readonly></textarea>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
        <label style="font-weight: bold;">2. AIの回答をそのまま貼り付け</label>
        <div style="display: flex; gap: 5px;">
            <button onclick="pasteTo('bulkInput')" style="width: auto; padding: 5px 12px; background: #007bff; color: white; font-size: 9px; border-radius: 4px; border: none;">貼り付け</button>
            <button onclick="document.getElementById('bulkInput').value=''" style="width: auto; padding: 5px 12px; background: #6c757d; color: white; font-size: 9px; border-radius: 4px; border: none;">クリア</button>
        </div>
    </div>
    <textarea id="bulkInput" style="height: 180px;" placeholder="AIの回答全文を貼り付け" readonly></textarea>

    <button onclick="processCode()">安全に合体させる</button>

    <div id="status" class="result"></div>
    <div id="outputContainer" style="display:none;">
        <label>完成したコード（合体結果）</label>
        <button onclick="copyOutput()" style="width: auto; padding: 8px 15px; background: #28a745; margin-bottom: 5px; font-size: 14px;">このコードをコピー</button>
        <button onclick="openPreview()" style="width: auto; padding: 8px 15px; background: #17a2b8; color: white; margin-bottom: 5px; border: none; border-radius: 4px; font-size: 14px;">全画面プレビュー</button>
        <div id="outputCode"></div>
    </div>
    <iframe id="previewModal"></iframe>
    <button id="closePreview" style="display:none;" onclick="closePreview()">×</button>

    <script>
        async function pasteTo(id) {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById(id).value = text;
            } catch (err) {
                alert("貼り付け失敗。設定を確認してください。");
            }
        }

        function copyOutput() {
            const code = document.getElementById('outputCode').innerText;
            navigator.clipboard.writeText(code).then(() => alert("コピー完了！"));
        }

        function processCode() {
            const master = document.getElementById('masterCode').value;
            const bulkText = document.getElementById('bulkInput').value;
            const status = document.getElementById('status');
            const outputContainer = document.getElementById('outputContainer');
            const outputCode = document.getElementById('outputCode');

            if (!master || !bulkText) return;

            let blocks = [];
            if (bulkText.includes('```')) {
                blocks = bulkText.match(/```(?:[a-z]*)\n?([\s\S]*?)```/g).map(b => b.replace(/```[a-z]*\n?/g, '').replace(/```/g, '').trim());
            } else {
                blocks = bulkText.split(/部品[AB]（修正[前後]）：/g).map(b => b.trim()).filter(b => b !== '');
            }
            
            if (blocks.length < 2) {
                status.innerHTML = "❌ 修正セットがうまく読み取れませんでした。";
                status.className = "result error";
                status.style.display = "block";
                return;
            }

            let updated = master;
            let successCount = 0;
            let errors = [];

            for (let i = 0; i < blocks.length; i += 2) {
                if (i + 1 >= blocks.length) break;
                const search = blocks[i];
                const replace = blocks[i+1];

                if (updated.includes(search)) {
                    updated = updated.split(search).join(replace);
                    successCount++;
                } else {
                    errors.push(`${Math.floor(i/2) + 1}番目のセットが不一致`);
                }
            }

            if (successCount > 0) {
                status.innerHTML = `✅ ${successCount}箇所の合体に成功！`;
                if (errors.length > 0) status.innerHTML += `<br>⚠️ 失敗: ${errors.join(' ')}`;
                status.className = "result success";
                status.style.display = "block";
                outputCode.innerText = updated;
                outputContainer.style.display = "block";
            } else {
                status.innerHTML = "❌ 合体できる箇所がありませんでした。";
                status.className = "result error";
                status.style.display = "block";
            }
        }

        function openPreview() {
            const code = document.getElementById('outputCode').innerText;
            const modal = document.getElementById('previewModal');
            const closeBtn = document.getElementById('closePreview');
            const doc = modal.contentDocument || modal.contentWindow.document;
            doc.open(); doc.write(code); doc.close();
            modal.style.display = 'block'; closeBtn.style.display = 'block';
        }

        function closePreview() {
            document.getElementById('previewModal').style.display = 'none';
            document.getElementById('closePreview').style.display = 'none';
        }

        function copyProtocol() {
            const protocol = `あなたは私の「真のコーティングパートナー」です。以下の「一括パーツ納品プロトコル」を厳守してください。\n\n【実行プロトコル】\n1. ソースコード全文を出力することは厳禁です。\n2. 修正箇所は必ず「セット」で提示してください。\n - 部品A（修正前）：修正箇所を1文字の狂いもなく抜き出したもの。\n - 部品B（修正後）：新しいコード。\n3. 修正が複数ある場合はセットを順番に並べてください。\n4. 回答全文をコピーして「RopMarge」に貼り付けるため、不一致エラーを最大の恥としてください。\n\n承認が必要な場合はコードを書かずに待機し、私が「🙋‍♀️」と送ったらこのプロトコルに従って部品を提示してください。\n\n準備ができたら「マスターコードを読み込みます。貼り付けてください」とだけ返答してください。`;
            navigator.clipboard.writeText(protocol).then(() => {
                alert("プロトコルをコピーしました。");
            });
        }
    </script>
</div>
</body>
</html>
